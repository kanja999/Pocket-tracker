<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>

<meta name="apple-mobile-web-app-title" content="Pocket"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2336;
    --border: rgba(255,255,255,0.07);
    --text: #f0f2ff;
    --text2: #8890a8;
    --green: #00e5a0;
    --green-dim: rgba(0,229,160,0.12);
    --red: #ff5f7e;
    --red-dim: rgba(255,95,126,0.12);
    --blue: #4d9fff;
    --blue-dim: rgba(77,159,255,0.12);
    --amber: #ffb547;
    --amber-dim: rgba(255,181,71,0.12);
    --purple: #a78bfa;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* ===== LOGIN SCREEN ===== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(77,159,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0,229,160,0.08) 0%, transparent 50%),
                var(--bg);
  }

  .login-logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--blue), var(--green));
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    box-shadow: 0 20px 60px rgba(77,159,255,0.3);
  }

  .login-title {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px; text-align: center;
  }

  .login-sub {
    color: var(--text2); font-size: 14px;
    text-align: center; margin-bottom: 48px;
    line-height: 1.6;
  }

  .btn-google {
    width: 100%;
    background: #fff;
    color: #1a1a2e;
    border: none;
    border-radius: var(--radius);
    padding: 16px 24px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(255,255,255,0.15);
  }
  .btn-google:active { transform: scale(0.97); }
  .btn-google img { width: 20px; height: 20px; }

  /* ===== MAIN APP ===== */
  #app { display: none; min-height: 100vh; padding-bottom: 80px; }

  /* Header */
  .header {
    padding: 52px 20px 20px;
    background: linear-gradient(180deg, rgba(77,159,255,0.08) 0%, transparent 100%);
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }

  .user-info { display: flex; align-items: center; gap: 10px; }

  .user-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--border);
  }

  .user-avatar-placeholder {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; border: 2px solid var(--border);
  }

  .user-name { font-size: 13px; font-weight: 600; color: var(--text2); }
  .greeting { font-size: 11px; color: var(--text2); opacity: 0.6; }

  .btn-logout {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); border-radius: 8px; padding: 7px 12px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-logout:active { background: var(--surface); }

  /* Balance Card */
  .balance-card {
    background: linear-gradient(135deg, #1a2540, #0f1a35);
    border: 1px solid rgba(77,159,255,0.2);
    border-radius: 24px;
    padding: 24px;
    position: relative; overflow: hidden;
  }

  .balance-card::before {
    content: '';
    position: absolute; top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(77,159,255,0.15), transparent 70%);
    border-radius: 50%;
  }

  .balance-label { font-size: 12px; color: var(--text2); font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

  .balance-amount {
    font-family: 'Space Mono', monospace;
    font-size: 28px; font-weight: 700;
    margin: 8px 0 4px; letter-spacing: -1px;
    line-height: 1.1;
  }

  .balance-month { font-size: 12px; color: var(--text2); }

  .balance-stats {
    display: flex; gap: 12px; margin-top: 20px;
  }

  .stat-pill {
    flex: 1; background: rgba(255,255,255,0.05);
    border-radius: 12px; padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }

  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .stat-dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }

  .stat-info { min-width: 0; }
  .stat-lbl { font-size: 10px; color: var(--text2); font-weight: 500; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Tabs */
  .tabs {
    display: flex; gap: 6px;
    padding: 16px 20px 0;
  }

  .tab {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 9px 6px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--text2); cursor: pointer;
    transition: all 0.15s; text-align: center;
  }

  .tab.active {
    background: var(--blue-dim);
    border-color: rgba(77,159,255,0.3);
    color: var(--blue);
  }

  /* Section */
  .section { padding: 20px; }
  .section-title {
    font-size: 13px; font-weight: 700;
    color: var(--text2); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 14px;
  }

  /* Quick Actions */
  .quick-actions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 20px 4px;
  }

  .btn-action {
    border: none; border-radius: var(--radius);
    padding: 16px; cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    transition: transform 0.15s, filter 0.15s;
  }
  .btn-action:active { transform: scale(0.97); filter: brightness(0.9); }

  .btn-income {
    background: var(--green-dim);
    border: 1px solid rgba(0,229,160,0.25);
    color: var(--green);
  }

  .btn-expense {
    background: var(--red-dim);
    border: 1px solid rgba(255,95,126,0.25);
    color: var(--red);
  }

  .btn-icon { font-size: 20px; }
  .btn-text { font-size: 13px; }

  /* Transaction List */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }

  .tx-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tx-emoji {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }

  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .tx-amount {
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    flex-shrink: 0; text-align: right;
  }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }

  .tx-delete {
    background: var(--red-dim); border: none;
    border-radius: 8px; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--red); font-size: 14px;
    flex-shrink: 0; transition: background 0.15s;
  }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text2);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 430px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }

  .form-group { margin-bottom: 14px; }

  .form-label { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; display: block; letter-spacing: 0.3px; }

  .form-input, .form-select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; color: var(--text);
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus {
    border-color: var(--blue);
  }
  .form-input::placeholder { color: var(--text2); }

  .category-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .cat-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 6px;
    cursor: pointer; text-align: center;
    transition: all 0.15s; display: flex;
    flex-direction: column; align-items: center; gap: 4px;
  }

  .cat-btn.selected {
    border-color: var(--blue);
    background: var(--blue-dim);
  }

  .cat-btn .cat-emoji { font-size: 20px; }
  .cat-btn .cat-label { font-size: 9px; color: var(--text2); font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; }

  .btn-submit {
    width: 100%; background: linear-gradient(135deg, var(--blue), #7c3aed);
    border: none; border-radius: var(--radius);
    padding: 16px; color: #fff;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 6px;
    transition: filter 0.15s, transform 0.15s;
  }
  .btn-submit:active { filter: brightness(0.9); transform: scale(0.98); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-cancel {
    width: 100%; background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px; color: var(--text2);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; margin-top: 8px;
  }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 430px;
    background: rgba(15,17,23,0.9);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around;
    padding: 12px 0 24px;
    z-index: 50;
  }

  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; padding: 4px 16px;
    transition: color 0.15s;
    color: var(--text2); font-size: 10px; font-weight: 600;
  }
  .nav-item.active { color: var(--blue); }
  .nav-item .nav-icon { font-size: 20px; }

  /* Tab Content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Chart */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .chart-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; }

  .bar-chart { display: flex; flex-direction: column; gap: 10px; }

  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 11px; color: var(--text2); width: 70px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .bar-val { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--text2); width: 60px; text-align: right; flex-shrink: 0; }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 40px; color: var(--text2); font-size: 13px; gap: 8px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Filter */
  .filter-row {
    display: flex; gap: 8px; padding: 0 20px 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    font-size: 12px; font-weight: 600; color: var(--text2);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    font-family: 'Plus Jakarta Sans', sans-serif;
    transition: all 0.15s;
  }
  .filter-chip.active {
    background: var(--blue-dim);
    border-color: rgba(77,159,255,0.3);
    color: var(--blue);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">💰</div>
  <div class="login-title">Pocket Tracker</div>
  <div class="login-sub">Lacak pemasukan & pengeluaran<br/>secara real-time di semua device</div>
  <button class="btn-google" onclick="signInGoogle()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Masuk dengan Google
  </button>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="user-info">
        <div id="user-avatar-wrap"></div>
        <div>
          <div class="greeting" id="greeting-text">Selamat datang</div>
          <div class="user-name" id="user-name-text">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="signOut()">Keluar</button>
    </div>

    <div class="balance-card">
      <div class="balance-label">Saldo Bulan Ini</div>
      <div class="balance-amount" id="balance-amount">Rp 0</div>
      <div class="balance-month" id="balance-month"></div>
      <div class="balance-stats">
        <div class="stat-pill">
          <div class="stat-dot green"></div>
          <div class="stat-info">
            <div class="stat-lbl">Pemasukan</div>
            <div class="stat-val" id="total-income">Rp 0</div>
          </div>
        </div>
        <div class="stat-pill">
          <div class="stat-dot red"></div>
          <div class="stat-info">
            <div class="stat-lbl">Pengeluaran</div>
            <div class="stat-val" id="total-expense">Rp 0</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button class="btn-action btn-income" onclick="openModal('income')">
      <span class="btn-icon">⬆️</span>
      <div class="btn-text">Pemasukan</div>
    </button>
    <button class="btn-action btn-expense" onclick="openModal('expense')">
      <span class="btn-icon">⬇️</span>
      <div class="btn-text">Pengeluaran</div>
    </button>
  </div>

  <!-- Filter -->
  <div class="filter-row" style="margin-top:16px;">
    <button class="filter-chip active" onclick="setFilter('all',this)">Semua</button>
    <button class="filter-chip" onclick="setFilter('income',this)">Pemasukan</button>
    <button class="filter-chip" onclick="setFilter('expense',this)">Pengeluaran</button>
  </div>

  <!-- Transactions -->
  <div class="section">
    <div class="section-title">Transaksi Terbaru</div>
    <div id="tx-list" class="tx-list">
      <div class="loading"><div class="spinner"></div> Memuat data...</div>
    </div>
  </div>

  <!-- Chart Section -->
  <div class="section" id="chart-section" style="display:none;">
    <div class="chart-wrap">
      <div class="chart-title">Pengeluaran per Kategori</div>
      <div class="bar-chart" id="expense-chart"></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">Pemasukan per Kategori</div>
      <div class="bar-chart" id="income-chart"></div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav" id="bottom-nav" style="display:none;">
  <div class="nav-item active" onclick="switchTab('home',this)">
    <span class="nav-icon">🏠</span>
    <span>Beranda</span>
  </div>
  <div class="nav-item" onclick="switchTab('chart',this)">
    <span class="nav-icon">📊</span>
    <span>Analitik</span>
  </div>
  <div class="nav-item" onclick="switchTab('history',this)">
    <span class="nav-icon">🕐</span>
    <span>Riwayat</span>
  </div>
</div>

<!-- Modal Add Transaction -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Tambah Pemasukan</div>

    <div class="form-group">
      <label class="form-label">Nominal (Rp)</label>
      <input class="form-input" id="input-amount" type="number" inputmode="numeric" placeholder="Contoh: 50000"/>
    </div>

    <div class="form-group">
      <label class="form-label">Keterangan</label>
      <input class="form-input" id="input-note" type="text" placeholder="Contoh: Gaji, Makan siang..."/>
    </div>

    <div class="form-group">
      <label class="form-label">Kategori</label>
      <div class="category-grid" id="category-grid"></div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="submitTransaction()">Simpan</button>
    <button class="btn-cancel" onclick="closeModal()">Batal</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDm5bq10NSbSfSKpADZRTWwyRMejJ7ojU8",
  authDomain: "pocket-traker.firebaseapp.com",
  projectId: "pocket-traker",
  storageBucket: "pocket-traker.firebasestorage.app",
  messagingSenderId: "166123608918",
  appId: "1:166123608918:web:76cf9a0208ab94c7d254f7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

// Categories
const INCOME_CATS = [
  { id:'gaji', emoji:'💼', label:'Gaji' },
  { id:'bonus', emoji:'🎁', label:'Bonus' },
  { id:'transfer', emoji:'💸', label:'Transfer' },
  { id:'jual', emoji:'🛒', label:'Jual' },
  { id:'freelance', emoji:'💻', label:'Freelance' },
  { id:'investasi', emoji:'📈', label:'Investasi' },
  { id:'lainnya', emoji:'✨', label:'Lainnya' },
];

const EXPENSE_CATS = [
  { id:'makan', emoji:'🍜', label:'Makan' },
  { id:'transport', emoji:'🚗', label:'Transport' },
  { id:'belanja', emoji:'🛍️', label:'Belanja' },
  { id:'tagihan', emoji:'💡', label:'Tagihan' },
  { id:'kesehatan', emoji:'💊', label:'Kesehatan' },
  { id:'hiburan', emoji:'🎮', label:'Hiburan' },
  { id:'pendidikan', emoji:'📚', label:'Pendidikan' },
  { id:'lainnya', emoji:'📦', label:'Lainnya' },
];

const CAT_COLORS = {
  makan:'#ff7043', transport:'#42a5f5', belanja:'#ab47bc',
  tagihan:'#ffca28', kesehatan:'#26c6da', hiburan:'#ec407a',
  pendidikan:'#66bb6a', gaji:'#00e5a0', bonus:'#ffd740',
  transfer:'#4d9fff', jual:'#ff5f7e', freelance:'#a78bfa',
  investasi:'#00e5a0', lainnya:'#8890a8'
};

// State
let currentUser = null;
let currentType = 'income';
let selectedCat = null;
let allTransactions = [];
let unsubscribe = null;
let currentFilter = 'all';
let currentTab = 'home';

// Format Rupiah
function formatRp(n) {
  if (!n && n !== 0) return 'Rp 0';
  return 'Rp ' + Math.abs(n).toLocaleString('id-ID');
}

// Greeting
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Selamat Pagi ☀️';
  if (h < 17) return 'Selamat Siang 🌤️';
  if (h < 20) return 'Selamat Sore 🌅';
  return 'Selamat Malam 🌙';
}

// Month name
function getMonthName() {
  return new Date().toLocaleDateString('id-ID', { month:'long', year:'numeric' });
}

// Auth state
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    showApp(user);
    loadTransactions(user.uid);
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('bottom-nav').style.display = 'none';
    if (unsubscribe) unsubscribe();
  }
});

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('greeting-text').textContent = getGreeting();
  document.getElementById('user-name-text').textContent = user.displayName || user.email;
  document.getElementById('balance-month').textContent = getMonthName();

  const wrap = document.getElementById('user-avatar-wrap');
  if (user.photoURL) {
    wrap.innerHTML = `<img src="${user.photoURL}" class="user-avatar" referrerpolicy="no-referrer"/>`;
  } else {
    const initials = (user.displayName||'?').charAt(0).toUpperCase();
    wrap.innerHTML = `<div class="user-avatar-placeholder">${initials}</div>`;
  }
}

function loadTransactions(uid) {
  const q = query(
    collection(db, 'transactions'),
    where('uid', '==', uid)
  );

  unsubscribe = onSnapshot(q, snap => {
    allTransactions = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => {
        const ta = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || 0);
        const tb = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt || 0);
        return tb - ta;
      });
    renderAll();
  }, err => {
    console.error(err);
    document.getElementById('tx-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <p>Gagal memuat data.<br/>Cek koneksi internet Anda.</p>
      </div>`;
  });
}

function renderAll() {
  renderSummary();
  renderTransactions();
  renderCharts();
}

function renderSummary() {
  const now = new Date();
  const thisMonth = allTransactions.filter(t => {
    if (!t.createdAt) return false;
    const d = t.createdAt.toDate ? t.createdAt.toDate() : new Date(t.createdAt);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });

  const income = thisMonth.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = thisMonth.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  document.getElementById('balance-amount').textContent = formatRp(balance);
  document.getElementById('balance-amount').style.color = balance >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('total-income').textContent = formatRp(income);
  document.getElementById('total-expense').textContent = formatRp(expense);
}

function renderTransactions() {
  const list = document.getElementById('tx-list');
  let data = allTransactions;

  if (currentFilter === 'income') data = data.filter(t=>t.type==='income');
  if (currentFilter === 'expense') data = data.filter(t=>t.type==='expense');

  if (data.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💳</div>
        <p>Belum ada transaksi.<br/>Mulai tambah pemasukan atau pengeluaran!</p>
      </div>`;
    return;
  }

  list.innerHTML = data.slice(0,30).map(t => {
    const isIncome = t.type === 'income';
    const cats = isIncome ? INCOME_CATS : EXPENSE_CATS;
    const cat = cats.find(c=>c.id===t.category) || { emoji:'💰', label:'Lainnya' };
    const color = CAT_COLORS[t.category] || '#8890a8';
    const d = t.createdAt?.toDate ? t.createdAt.toDate() : new Date(t.createdAt||Date.now());
    const dateStr = d.toLocaleDateString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});

    return `
      <div class="tx-item">
        <div class="tx-emoji" style="background:${color}22;">${cat.emoji}</div>
        <div class="tx-info">
          <div class="tx-name">${t.note || cat.label}</div>
          <div class="tx-meta">${cat.label} · ${dateStr}</div>
        </div>
        <div class="tx-amount ${t.type}">${isIncome?'+':'-'}${formatRp(t.amount)}</div>
        <button class="tx-delete" onclick="deleteTx('${t.id}')">✕</button>
      </div>`;
  }).join('');
}

function renderCharts() {
  const expenseData = {};
  const incomeData = {};
  const now = new Date();

  allTransactions.forEach(t => {
    if (!t.createdAt) return;
    const d = t.createdAt.toDate ? t.createdAt.toDate() : new Date(t.createdAt);
    if (d.getMonth() !== now.getMonth() || d.getFullYear() !== now.getFullYear()) return;

    const cat = t.category || 'lainnya';
    if (t.type === 'expense') expenseData[cat] = (expenseData[cat]||0) + t.amount;
    if (t.type === 'income') incomeData[cat] = (incomeData[cat]||0) + t.amount;
  });

  renderBarChart('expense-chart', expenseData, EXPENSE_CATS);
  renderBarChart('income-chart', incomeData, INCOME_CATS);
}

function renderBarChart(elId, data, cats) {
  const el = document.getElementById(elId);
  const entries = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  if (entries.length === 0) {
    el.innerHTML = '<div style="color:var(--text2);font-size:13px;text-align:center;padding:12px;">Tidak ada data bulan ini</div>';
    return;
  }

  const max = Math.max(...entries.map(e=>e[1]));
  el.innerHTML = entries.map(([catId, val]) => {
    const cat = cats.find(c=>c.id===catId) || { emoji:'📦', label: catId };
    const color = CAT_COLORS[catId] || '#8890a8';
    const pct = max > 0 ? (val/max*100) : 0;
    return `
      <div class="bar-row">
        <div class="bar-label">${cat.emoji} ${cat.label}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
        <div class="bar-val">${formatRp(val).replace('Rp ','')}</div>
      </div>`;
  }).join('');
}

// Expose globals
window.signInGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert('Login gagal: ' + e.message); }
};

window.signOut = async () => {
  if (confirm('Yakin ingin keluar?')) {
    if (unsubscribe) unsubscribe();
    await fbSignOut(auth);
  }
};

window.openModal = (type) => {
  currentType = type;
  selectedCat = null;
  document.getElementById('input-amount').value = '';
  document.getElementById('input-note').value = '';
  document.getElementById('modal-title').textContent = type === 'income' ? '➕ Tambah Pemasukan' : '➖ Tambah Pengeluaran';

  const cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
  document.getElementById('category-grid').innerHTML = cats.map(c => `
    <button class="cat-btn" onclick="selectCat('${c.id}',this)">
      <span class="cat-emoji">${c.emoji}</span>
      <span class="cat-label">${c.label}</span>
    </button>`).join('');

  document.getElementById('modal').classList.add('open');
  document.getElementById('input-amount').focus();
};

window.closeModal = () => {
  document.getElementById('modal').classList.remove('open');
};

window.selectCat = (id, el) => {
  selectedCat = id;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
};

window.submitTransaction = async () => {
  const amount = parseFloat(document.getElementById('input-amount').value);
  const note = document.getElementById('input-note').value.trim();

  if (!amount || amount <= 0) { alert('Masukkan nominal yang valid'); return; }
  if (!selectedCat) { alert('Pilih kategori terlebih dahulu'); return; }
  if (!currentUser) return;

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Menyimpan...';

  try {
    await addDoc(collection(db, 'transactions'), {
      uid: currentUser.uid,
      type: currentType,
      amount,
      note: note || '',
      category: selectedCat,
      createdAt: serverTimestamp()
    });
    closeModal();
  } catch(e) {
    alert('Gagal menyimpan: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Simpan';
  }
};

window.deleteTx = async (id) => {
  if (!confirm('Hapus transaksi ini?')) return;
  try {
    await deleteDoc(doc(db, 'transactions', id));
  } catch(e) {
    alert('Gagal menghapus: ' + e.message);
  }
};

window.setFilter = (filter, el) => {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTransactions();
};

window.switchTab = (tab, el) => {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');

  const txSection = document.querySelector('.section:first-of-type');
  const chartSection = document.getElementById('chart-section');
  const filterRow = document.querySelector('.filter-row');
  const quickActions = document.querySelector('.quick-actions');

  if (tab === 'home') {
    quickActions.style.display = 'grid';
    filterRow.style.display = 'flex';
    txSection.style.display = 'block';
    chartSection.style.display = 'none';
    currentFilter = 'all';
    document.querySelectorAll('.filter-chip').forEach((c,i)=>{
      c.classList.toggle('active', i===0);
    });
    renderTransactions();
  } else if (tab === 'chart') {
    quickActions.style.display = 'none';
    filterRow.style.display = 'none';
    txSection.style.display = 'none';
    chartSection.style.display = 'block';
    renderCharts();
  } else if (tab === 'history') {
    quickActions.style.display = 'none';
    filterRow.style.display = 'flex';
    txSection.style.display = 'block';
    chartSection.style.display = 'none';
  }
};

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
